// ── HELPERS ───────────────────────────────────────────────────────────────────
const Stripe = ({label, t, style={}}) => (
  <div style={{width:'100%',height:'100%',background:`repeating-linear-gradient(45deg,${t.bgSubtle},${t.bgSubtle} 8px,${t.bgInput} 8px,${t.bgInput} 16px)`,display:'flex',alignItems:'center',justifyContent:'center',...style}}>

  </div>

const Btn = ({children, accent, t, style={}, ...props}) => {
  const [h,setH] = React.useState(false);
  return (
    <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{cursor:'pointer',fontFamily:'Outfit',fontWeight:500,fontSize:13,letterSpacing:'0.08em',textTransform:'uppercase',border:'none',transition:'all 0.18s',
        background: accent ? (h?t.accentHover:t.accent) : 'none',
        color: accent ? t.accentText : (h?t.text:t.textMuted),
        border: accent ? 'none' : `1px solid ${h?t.text:t.border}`,
        ...style}} {...props}>{children}</button>
  );
};

        {[['Browse','browse'],['Stories','stories'],['How it works','home'],['Contact','home']].map(([label,dest])=>(
          <NavLink key={label} t={t} onClick={()=>setScreen(dest)}>{label}</NavLink>

          style={{position:'relative',background:'none',border:`1px solid ${t.border}`,cursor:'pointer',fontFamily:'Outfit',fontSize:12,fontWeight:500,color:t.text,padding:'8px 20px',letterSpacing:'0.06em',transition:'all 0.18s'}}

function CatTile({cat, t, onClick}) {

// ── BROWSE PAGE ───────────────────────────────────────────────────────────────

    <div style={{background:t.bg,minHeight:'100vh',padding:'48px 80px'}}>

            <div><label style={lStyle}>Phone</label><input style={iStyle} value={form.phone} onChange={set('phone')} placeholder="+32 470 000 000" /></div>

          </div>
        )}
        {step===2&&(
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            <div><label style={lStyle}>Delivery address</label><input style={iStyle} value={form.address} onChange={set('address')} placeholder="Meir 1" /></div>

function EventDetailPage({t, ev, setScreen, setItem, addToCart}) {
  const [activePin, setActivePin]=React.useState(null);
  const usedItems=ITEMS.filter(i=>ev.itemIds.includes(i.id));
  const [added,setAdded]=React.useState({});

  const handleAdd=(item)=>{
    addToCart({...item,qty:1,days:1});
    setAdded(a=>({...a,[item.id]:true}));
    setTimeout(()=>setAdded(a=>({...a,[item.id]:false})),2000);
  };

  return (
    <div style={{background:t.bg,minHeight:'100vh',padding:'44px 80px'}}>
      <div style={{maxWidth:1160,margin:'0 auto'}}>
        <button onClick={()=>setScreen('stories')} style={{background:'none',border:'none',cursor:'pointer',fontFamily:'Outfit',fontSize:12,color:t.textMuted,marginBottom:28,letterSpacing:'0.05em'}}>← Back to Stories</button>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:36,borderBottom:`1px solid ${t.border}`,paddingBottom:28}}>
          <div>
            <div style={{display:'flex',gap:8,marginBottom:14}}>
              <span style={{fontFamily:'Outfit',fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.accentText,background:t.accent,padding:'4px 10px'}}>{ev.type}</span>
              <span style={{fontFamily:'Outfit',fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase',color:t.textMuted,border:`1px solid ${t.border}`,padding:'4px 10px'}}>{ev.date} · {ev.location}</span>
            </div>
            <h1 style={{fontFamily:'Cormorant Garamond, serif',fontSize:44,fontWeight:500,color:t.text,lineHeight:1.1}}>{ev.customer}</h1>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 340px',gap:48,alignItems:'start'}}>

                    {/* Pin button */}
                    <button onClick={e=>{e.stopPropagation();setActivePin(isActive?null:idx);}}
                      style={{width:30,height:30,borderRadius:'50%',background:isActive?t.accent:t.bg,border:`2px solid ${t.accent}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 12px rgba(0,0,0,0.3)',transition:'all 0.2s',position:'relative'}}>

                        {/* Arrow */}
                        <div style={{position:'absolute',bottom:-6,left:'50%',transform:'translateX(-50%)',width:10,height:10,background:t.bgCard,border:`1px solid ${t.border}`,borderTop:'none',borderLeft:'none',transform:'translateX(-50%) rotate(45deg)'}} />
                      </div>
                    )}

            <h2 style={{fontFamily:'Cormorant Garamond, serif',fontSize:26,fontWeight:500,color:t.text,marginBottom:6}}>Shop this event</h2>
            <p style={{fontFamily:'Outfit',fontSize:12,color:t.textMuted,marginBottom:22,lineHeight:1.6}}>{usedItems.length} items used in this event</p>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {usedItems.map(item=>(
                <div key={item.id} style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:1,padding:'14px 16px',display:'grid',gridTemplateColumns:'52px 1fr',gap:12,alignItems:'center'}}>
                  <div style={{width:52,height:52,borderRadius:1,overflow:'hidden',flexShrink:0}}><Stripe label="" t={t} style={{height:'100%'}} /></div>
                  <div>
                    <p style={{fontFamily:'Outfit',fontSize:10,color:t.accent,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:2}}>{item.cat}</p>
                    <p style={{fontFamily:'Cormorant Garamond, serif',fontSize:16,fontWeight:500,color:t.text,marginBottom:6,lineHeight:1.2}}>{item.name}</p>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontFamily:'Outfit',fontSize:12,color:t.textMuted}}>€{item.price}/{item.unit}</span>
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>{setItem(item);setScreen('detail');}} style={{background:'none',border:`1px solid ${t.border}`,cursor:'pointer',fontFamily:'Outfit',fontSize:10,fontWeight:500,padding:'5px 10px',letterSpacing:'0.06em',color:t.text,borderRadius:1}}>View</button>
                        <button onClick={()=>handleAdd(item)} style={{background:added[item.id]?t.bgSubtle:t.accent,color:added[item.id]?t.text:t.accentText,border:'none',cursor:'pointer',fontFamily:'Outfit',fontSize:10,fontWeight:500,padding:'5px 10px',letterSpacing:'0.06em',borderRadius:1,transition:'all 0.25s'}}>
                          {added[item.id]?'✓':'+ Cart'}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      <style>{`@keyframes pulse{0%,100%{transform:scale(1);opacity:0.4;}50%{transform:scale(1.4);opacity:0.1;}}`}</style>
    </div>
  );
}

// ── ADMIN PAGE ────────────────────────────────────────────────────────────────
function AdminPage({t, events, setEvents, setScreen}) {
  const blank={customer:'',type:'Wedding',date:'',location:'',quote:'',imageUrl:'',itemIds:[]};
  const [form,setForm]=React.useState(blank);
  const [saved,setSaved]=React.useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const toggleItem=id=>setForm(f=>({...f,itemIds:f.itemIds.includes(id)?f.itemIds.filter(i=>i!==id):[...f.itemIds,id]}));
  const submit=()=>{
    if(!form.customer||!form.quote) return;
    const newEv={...form,id:Date.now(),hotspots:form.itemIds.slice(0,4).map((itemId,i)=>({itemId,x:20+i*20,y:30+i*15}))};
    setEvents(evs=>[newEv,...evs]);
    setForm(blank);setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const iStyle={background:t.bgInput,border:`1px solid ${t.border}`,color:t.text,fontFamily:'Outfit',fontSize:13,padding:'10px 14px',outline:'none',width:'100%',borderRadius:1};
  const lStyle={fontFamily:'Outfit',fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.textMuted,marginBottom:7,display:'block'};

  return (
    <div style={{background:t.bg,minHeight:'100vh',padding:'44px 80px'}}>
      <div style={{maxWidth:900,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:36,borderBottom:`1px solid ${t.border}`,paddingBottom:24}}>
          <div>
            <p style={{fontFamily:'Outfit',fontSize:11,letterSpacing:'0.2em',color:t.accent,textTransform:'uppercase',marginBottom:8}}>Admin</p>
            <h1 style={{fontFamily:'Cormorant Garamond, serif',fontSize:40,fontWeight:500,color:t.text}}>Manage Events</h1>
          </div>
          <button onClick={()=>setScreen('stories')} style={{background:'none',border:`1px solid ${t.border}`,cursor:'pointer',fontFamily:'Outfit',fontSize:12,color:t.textMuted,padding:'8px 18px',letterSpacing:'0.06em'}}>View Stories →</button>
        </div>

        {/* Add event form */}
        <div style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:2,padding:'32px 36px',marginBottom:36}}>
          <h2 style={{fontFamily:'Cormorant Garamond, serif',fontSize:24,fontWeight:500,color:t.text,marginBottom:24}}>Add New Event</h2>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div><label style={lStyle}>Customer name</label><input style={iStyle} value={form.customer} onChange={set('customer')} placeholder="Sarah & Tom Verhaegen" /></div>
            <div>
              <label style={lStyle}>Event type</label>
              <select style={iStyle} value={form.type} onChange={set('type')}>
                {['Wedding','Birthday Dinner','Corporate Gala','Brand Launch','Private Party','Other'].map(o=><option key={o}>{o}</option>)}
              </select>
            </div>
            <div><label style={lStyle}>Date</label><input style={iStyle} value={form.date} onChange={set('date')} placeholder="March 2026" /></div>
            <div><label style={lStyle}>Location</label><input style={iStyle} value={form.location} onChange={set('location')} placeholder="Venue name, city" /></div>
          </div>
          <div style={{marginBottom:16}}><label style={lStyle}>Photo URL (optional)</label><input style={iStyle} value={form.imageUrl} onChange={set('imageUrl')} placeholder="https://… (leave blank for placeholder)" /></div>
          <div style={{marginBottom:20}}><label style={lStyle}>Customer quote / story</label><textarea style={{...iStyle,minHeight:90,resize:'vertical'}} value={form.quote} onChange={set('quote')} placeholder="Tell the event story in the customer's own words…" /></div>
          <div style={{marginBottom:24}}>
            <label style={lStyle}>Items used in this event</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {ITEMS.map(item=>(
                <label key={item.id} style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer',padding:'8px 10px',border:`1px solid ${form.itemIds.includes(item.id)?t.accent:t.border}`,borderRadius:1,background:form.itemIds.includes(item.id)?`${t.accent}18`:t.bgInput,transition:'all 0.15s'}}>
                  <input type="checkbox" checked={form.itemIds.includes(item.id)} onChange={()=>toggleItem(item.id)} style={{accentColor:t.accent}} />
                  <span style={{fontFamily:'Outfit',fontSize:12,color:t.text,lineHeight:1.3}}>{item.name}</span>
                </label>
              ))}
            </div>
          </div>
          <button onClick={submit} style={{background:saved?t.bgSubtle:t.accent,color:saved?t.text:t.accentText,border:'none',cursor:'pointer',fontFamily:'Outfit',fontWeight:500,fontSize:13,padding:'13px 32px',letterSpacing:'0.08em',textTransform:'uppercase',transition:'all 0.3s',borderRadius:1}}>
            {saved?'✓ Event Added':'Add Event'}
          </button>
        </div>

        {/* Existing events */}
        <h2 style={{fontFamily:'Cormorant Garamond, serif',fontSize:24,fontWeight:500,color:t.text,marginBottom:18}}>All Events ({events.length})</h2>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {events.map(ev=>(
            <div key={ev.id} style={{background:t.bgCard,border:`1px solid ${t.border}`,borderRadius:1,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <span style={{fontFamily:'Outfit',fontSize:10,color:t.accent,letterSpacing:'0.1em',textTransform:'uppercase',marginRight:10}}>{ev.type}</span>
                <span style={{fontFamily:'Cormorant Garamond, serif',fontSize:17,color:t.text,fontWeight:500}}>{ev.customer}</span>
                <span style={{fontFamily:'Outfit',fontSize:12,color:t.textMuted,marginLeft:12}}>{ev.date} · {ev.location}</span>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontFamily:'Outfit',fontSize:11,color:t.textMuted}}>{ev.itemIds.length} items</span>
                <button onClick={()=>setEvents(evs=>evs.filter(e=>e.id!==ev.id))} style={{background:'none',border:`1px solid ${t.border}`,cursor:'pointer',fontFamily:'Outfit',fontSize:11,color:t.textMuted,padding:'5px 12px',borderRadius:1,letterSpacing:'0.05em'}}>Remove</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "heroTag": "Event Decoration Rental · Antwerp, Belgium"
  }/*EDITMODE-END*/;
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = THEMES[tweaks.theme] || THEMES.dark;

  const [screen, setScreen] = React.useState('home');
  const [item, setItem] = React.useState(null);
  const [cart, setCart] = React.useState([]);
  const [events, setEvents] = React.useState(INITIAL_EVENTS);
  const [activeEvent, setActiveEvent] = React.useState(null);

  const addToCart = i => setCart(c => [...c, i]);
  const removeFromCart = idx => setCart(c => c.filter((_,i)=>i!==idx));
  const clearCart = () => setCart([]);

  // Scroll to top on screen change
  React.useEffect(()=>{ document.getElementById('scroller')?.scrollTo(0,0); },[screen]);

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',background:t.bg,transition:'background 0.4s'}}>
      <Nav t={t} setScreen={setScreen} cartCount={cart.length} />
      <div id="scroller" style={{flex:1,overflowY:'auto'}}>
        {screen==='home' && <HomePage t={t} setScreen={setScreen} setItem={setItem} heroTag={tweaks.heroTag} events={events} setEvent={setActiveEvent} />}
        {screen==='browse' && <BrowsePage t={t} setScreen={setScreen} setItem={setItem} />}
        {screen==='detail' && item && <DetailPage t={t} item={item} addToCart={addToCart} setScreen={setScreen} setItem={setItem} />}
        {screen==='cart' && <CartPage t={t} cart={cart} removeFromCart={removeFromCart} setScreen={setScreen} />}
        {screen==='checkout' && <CheckoutPage t={t} setScreen={setScreen} clearCart={clearCart} />}
        {screen==='stories' && <StoriesPage t={t} events={events} setScreen={setScreen} setEvent={ev=>{setActiveEvent(ev);}} />}
        {screen==='event' && activeEvent && <EventDetailPage t={t} ev={activeEvent} setScreen={setScreen} setItem={setItem} addToCart={addToCart} />}
        {screen==='admin' && <AdminPage t={t} events={events} setEvents={setEvents} setScreen={setScreen} />}
      </div>
      <TweaksPanel>
        <TweakSection title="Theme">
          <TweakRadio id="theme" label="Color theme" value={tweaks.theme} onChange={v=>setTweak('theme',v)} options={[{value:'dark',label:'Dark Luxury'},{value:'light',label:'Light Crisp'},{value:'warm',label:'Warm Earthy'}]} />
        </TweakSection>
        <TweakSection title="Copy">
          <TweakText id="heroTag" label="Hero sub-label" value={tweaks.heroTag} onChange={v=>setTweak('heroTag',v)} />
        </TweakSection>
        <TweakSection title="Admin">
          <TweakButton label="Manage Events" onClick={()=>setScreen('admin')} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
